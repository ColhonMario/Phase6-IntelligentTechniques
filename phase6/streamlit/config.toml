# Streamlit configuration for Fraud Detection app.

[theme]
base = "dark"
primaryColor = "#3498db"
backgroundColor = "#0e1117"
secondaryBackgroundColor = "#1a1f2e"
textColor = "#e8e8e8"
font = "sans serif"

[server]
# Allow larger CSVs for the batch-scoring tab (default is 200 MB).
maxUploadSize = 50

# Don't gather usage stats on Community Cloud — we already get them from there.
[browser]
gatherUsageStats = false
